<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Yéyé Assistant — IA Commerciale</title>
<link rel="icon" href="https://omkmmlbdkzhorrrbeabm.supabase.co/storage/v1/object/public/avatars/AF7B3561-29FF-4B02-90D6-C94B558EDA89.PNG" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --vd:#0B3D2E;--vm:#1a6b3c;--vl:#e8f5e9;
  --or:#FF8A00;--orl:#fff3e0;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g400:#9ca3af;--g600:#4b5563;--g900:#111827;
  --r:#dc2626;--bl:#2563eb;--gr:#16a34a;
  --max:430px;
  --shadow:0 2px 8px rgba(0,0,0,.1);--shadow-lg:0 8px 32px rgba(0,0,0,.15);
}
body{font-family:'Inter',sans-serif;background:#0B3D2E;min-height:100vh;display:flex;justify-content:center;align-items:center}
.app{width:100%;max-width:var(--max);height:100vh;display:flex;flex-direction:column;background:#f5f5f5;position:relative;overflow:hidden}

/* HEADER */
.header{background:linear-gradient(135deg,var(--vd),#0d4a36);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-logo{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.header-logo img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1}
.header-name{font-size:16px;font-weight:800;color:#fff}
.header-status{display:flex;align-items:center;gap:5px;margin-top:2px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.header-status span{font-size:12px;color:rgba(255,255,255,.75)}
.header-actions{display:flex;gap:8px}
.h-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .2s}
.h-btn:hover{background:rgba(255,255,255,.25)}

/* CHAT AREA */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}

/* MESSAGES */
.msg{display:flex;gap:8px;max-width:85%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--vd),var(--vm));color:#fff}
.msg-user .msg-avatar{background:linear-gradient(135deg,var(--or),#e67e00);color:#fff}
.msg-bubble{padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.5;box-shadow:var(--shadow)}
.msg-ai .msg-bubble{background:#fff;color:var(--g900);border-bottom-left-radius:4px}
.msg-user .msg-bubble{background:linear-gradient(135deg,var(--vd),var(--vm));color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--g400);margin-top:4px;text-align:right}
.msg-ai .msg-time{text-align:left}

/* TYPING INDICATOR */
.typing{display:flex;gap:4px;padding:12px 16px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;box-shadow:var(--shadow);align-self:flex-start;margin-left:40px}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--g400);animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* PRODUCT CARDS */
.products-scroll{display:flex;gap:12px;overflow-x:auto;padding:4px 0;scrollbar-width:none;margin-left:40px}
.products-scroll::-webkit-scrollbar{display:none}
.prod-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);flex-shrink:0;width:160px;cursor:pointer;transition:transform .2s}
.prod-card:hover{transform:translateY(-2px)}
.prod-card-img{width:100%;height:110px;object-fit:cover;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:36px}
.prod-card-body{padding:10px}
.prod-card-name{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-card-price{font-size:14px;font-weight:800;color:var(--vm);margin-bottom:8px}
.prod-card-btn{width:100%;padding:7px;background:linear-gradient(135deg,var(--vd),var(--vm));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:opacity .2s}
.prod-card-btn:hover{opacity:.9}
.prod-card-btn.added{background:linear-gradient(135deg,var(--gr),#15803d)}

/* BUNDLE CARD */
.bundle-card{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-left:40px;border-left:4px solid var(--or)}
.bundle-title{font-size:13px;font-weight:700;color:var(--or);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bundle-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--g100)}
.bundle-item:last-child{border-bottom:none}
.bundle-item-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bundle-item-name{flex:1;font-size:13px;font-weight:500}
.bundle-item-price{font-size:13px;font-weight:700;color:var(--vm)}
.bundle-total{display:flex;justify-content:space-between;padding-top:10px;font-weight:700;font-size:14px;border-top:1px solid var(--g200);margin-top:6px}
.bundle-total span:last-child{color:var(--vm)}
.bundle-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--or),#e67e00);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:opacity .2s}
.bundle-btn:hover{opacity:.9}

/* SUGGESTIONS CHIPS */
.suggestions{display:flex;gap:8px;flex-wrap:wrap;margin-left:40px}
.chip{background:#fff;border:1.5px solid var(--g200);color:var(--g600);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.chip:hover{border-color:var(--vd);color:var(--vd);background:var(--vl)}
.chip.orange{border-color:var(--or);color:var(--or)}
.chip.orange:hover{background:var(--orl)}

/* PANIER FLOTTANT */
.cart-float{position:absolute;bottom:72px;left:50%;transform:translateX(-50%) translateY(0);width:calc(100% - 32px);max-width:398px;z-index:50;transition:all .3s}
.cart-mini{background:linear-gradient(135deg,var(--vd),var(--vm));color:#fff;border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow-lg)}
.cart-mini-ico{font-size:22px}
.cart-mini-info{flex:1}
.cart-mini-count{font-size:13px;font-weight:600;opacity:.85}
.cart-mini-total{font-size:18px;font-weight:800}
.cart-mini-btn{background:var(--or);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.cart-mini-btn:hover{background:#e67e00}

/* CART DRAWER */
.cart-drawer{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.2);z-index:100;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
.cart-drawer.open{transform:translateY(0)}
.cart-drawer-handle{width:40px;height:4px;border-radius:2px;background:var(--g200);margin:12px auto 0}
.cart-drawer-head{padding:16px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.cart-drawer-head h2{font-size:17px;font-weight:800}
.cart-close{background:var(--g100);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--g50)}
.cart-item-img{width:48px;height:48px;border-radius:10px;object-fit:cover;background:var(--g100);flex-shrink:0;font-size:22px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:600}
.cart-item-price{font-size:13px;color:var(--vm);font-weight:700;margin-top:2px}
.cart-qty{display:flex;align-items:center;gap:8px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--g200);background:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-btn:hover{border-color:var(--vd);color:var(--vd)}
.cart-summary{padding:16px 20px;background:var(--g50)}
.cart-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}
.cart-row.total{font-weight:800;font-size:16px;color:var(--vd);border-top:1px solid var(--g200);padding-top:10px;margin-top:4px}
.cart-checkout-btn{margin:12px 20px 20px;width:calc(100% - 40px);padding:15px;background:linear-gradient(135deg,var(--or),#e67e00);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(255,138,0,.4);transition:opacity .2s}
.cart-checkout-btn:hover{opacity:.9}

/* INPUT ZONE */
.input-zone{padding:10px 12px;background:#fff;border-top:1px solid var(--g100);flex-shrink:0;display:flex;align-items:flex-end;gap:10px}
.input-wrap{flex:1;background:var(--g50);border-radius:24px;padding:10px 16px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--g200);transition:border .2s}
.input-wrap:focus-within{border-color:var(--vm)}
.input-wrap textarea{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;resize:none;outline:none;max-height:100px;line-height:1.5;color:var(--g900)}
.input-wrap textarea::placeholder{color:var(--g400)}
.mic-btn,.send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .2s}
.mic-btn{background:var(--g100);color:var(--g400)}
.mic-btn:hover{background:var(--g200)}
.send-btn{background:linear-gradient(135deg,var(--vd),var(--vm));color:#fff;box-shadow:0 4px 12px rgba(11,61,46,.3)}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{background:var(--g200);box-shadow:none;cursor:not-allowed}

/* QUICK REPLIES */
.quick-replies{display:flex;gap:8px;overflow-x:auto;padding:8px 12px 0;scrollbar-width:none;flex-shrink:0}
.quick-replies::-webkit-scrollbar{display:none}
.qr{background:#fff;border:1.5px solid var(--g200);color:var(--g600);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s;flex-shrink:0}
.qr:hover{border-color:var(--vd);color:var(--vd);background:var(--vl)}

/* OVERLAY */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.overlay.open{display:block}

/* AUTH OVERLAY */
.auth-overlay{position:absolute;inset:0;background:linear-gradient(135deg,var(--vd),#0d4a36);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .ico{font-size:48px}
.auth-logo h1{font-size:22px;font-weight:800;margin-top:8px}
.auth-logo p{font-size:13px;color:var(--g400);margin-top:4px}
.auth-tabs{display:flex;background:var(--g100);border-radius:10px;padding:4px;margin-bottom:20px}
.atab{flex:1;text-align:center;padding:8px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--g400)}
.atab.active{background:#fff;color:var(--g900);box-shadow:var(--shadow)}
.aform{display:none}.aform.active{display:block}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:500;color:var(--g600);margin-bottom:5px}
.fg input{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.fg input:focus{border-color:var(--vm)}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--vd),var(--vm));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.auth-err{color:var(--r);font-size:12px;text-align:center;margin-top:8px;display:none}
.auth-skip{width:100%;padding:10px;background:transparent;color:var(--g400);border:none;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px}

/* TOAST */
.toast{position:absolute;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--g900);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--gr)}.toast.err{background:var(--r)}

@media(min-width:431px){
  body{padding:20px 0}
  .app{border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .cart-float{bottom:90px}
}
</style>
</head>
<body>
<div class="app">

  <!-- AUTH OVERLAY -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="https://omkmmlbdkzhorrrbeabm.supabase.co/storage/v1/object/public/avatars/AF7B3561-29FF-4B02-90D6-C94B558EDA89.PNG" style="width:80px;height:80px;object-fit:contain;border-radius:50%;margin:0 auto 8px;display:block" onerror="this.style.display='none'"/>
        <h1>Yéyé Assistant</h1>
        <p>Votre vendeur IA personnel 🇧🇯</p>
      </div>
      <div class="auth-tabs">
        <button class="atab active" onclick="switchAuth('login',this)">Se connecter</button>
        <button class="atab" onclick="switchAuth('register',this)">S'inscrire</button>
      </div>
      <div class="aform active" id="af-login">
        <div class="fg"><label>Email</label><input type="email" id="a-email" placeholder="email@exemple.com"/></div>
        <div class="fg"><label>Mot de passe</label><input type="password" id="a-pass" placeholder="••••••••"/></div>
        <button class="auth-btn" onclick="doLogin()">Se connecter →</button>
        <div class="auth-err" id="a-err"></div>
      </div>
      <div class="aform" id="af-register">
        <div class="fg"><label>Nom complet</label><input type="text" id="r-nom" placeholder="Kofi Mensah"/></div>
        <div class="fg"><label>Email</label><input type="email" id="r-email" placeholder="email@exemple.com"/></div>
        <div class="fg"><label>Téléphone</label><input type="tel" id="r-tel" placeholder="97 00 00 00"/></div>
        <div class="fg"><label>Mot de passe</label><input type="password" id="r-pass" placeholder="Min. 6 caractères"/></div>
        <button class="auth-btn" onclick="doRegister()">Créer mon compte →</button>
        <div class="auth-err" id="r-err"></div>
      </div>
      <button class="auth-skip" onclick="skipAuth()">Continuer sans compte →</button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">
      <img src="https://omkmmlbdkzhorrrbeabm.supabase.co/storage/v1/object/public/avatars/AF7B3561-29FF-4B02-90D6-C94B558EDA89.PNG" onerror="this.parentElement.innerHTML='🤖'" alt="Yéyé"/>
    </div>
    <div class="header-info">
      <div class="header-name">Yéyé Assistant</div>
      <div class="header-status"><div class="status-dot"></div><span>En ligne • Répond instantanément</span></div>
    </div>
    <div class="header-actions">
      <button class="h-btn" onclick="window.location.href='index.html'" title="Boutique">🏪</button>
      <button class="h-btn" onclick="clearChat()" title="Nouvelle conversation">🔄</button>
    </div>
  </header>

  <!-- QUICK REPLIES -->
  <div class="quick-replies" id="quick-replies">
    <button class="qr" onclick="sendQuick('Je veux manger pour 5000 FCFA')">🍽️ Repas 5000 FCFA</button>
    <button class="qr" onclick="sendQuick('Produits frais du marché')">🥬 Marché frais</button>
    <button class="qr" onclick="sendQuick('Quels sont vos promotions ?')">🔥 Promotions</button>
    <button class="qr" onclick="sendQuick('Je cherche du poisson')">🐟 Poisson</button>
    <button class="qr" onclick="sendQuick('Livraison rapide')">🚀 Livraison rapide</button>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area"></div>

  <!-- PANIER FLOTTANT -->
  <div class="cart-float" id="cart-float" style="display:none">
    <div class="cart-mini" onclick="openCart()">
      <div class="cart-mini-ico">🛒</div>
      <div class="cart-mini-info">
        <div class="cart-mini-count" id="cf-count">0 article</div>
        <div class="cart-mini-total" id="cf-total">0 FCFA</div>
      </div>
      <button class="cart-mini-btn" onclick="event.stopPropagation();openCart()">Voir →</button>
    </div>
  </div>

  <!-- CART DRAWER -->
  <div class="overlay" id="cart-overlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-handle"></div>
    <div class="cart-drawer-head">
      <h2>🛒 Mon panier</h2>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-summary" id="cart-summary"></div>
    <button class="cart-checkout-btn" onclick="checkout()">💳 Valider ma commande</button>
  </div>

  <!-- INPUT ZONE -->
  <div class="input-zone">
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Dites-moi ce que vous cherchez..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://omkmmlbdkzhorrrbeabm.supabase.co';
const SUPA_KEY='sb_publishable_iRVe8__SUK3ol0UGdo9FDA_B-6iovQs';
const CLAUDE_KEY=''; // Handled by Anthropic API proxy
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let currentUser=null;
let cart={};
let conversationHistory=[];
let allProducts=[];
let isTyping=false;

// AUTH
async function checkSession(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    document.getElementById('auth-overlay').style.display='none';
    initChat();
  }
}

function skipAuth(){
  document.getElementById('auth-overlay').style.display='none';
  initChat();
}

function switchAuth(type,btn){
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.aform').forEach(f=>f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('af-'+type).classList.add('active');
}

async function doLogin(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const err=document.getElementById('a-err');
  err.style.display='none';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='❌ '+error.message;err.style.display='block';return;}
  currentUser=data.user;
  document.getElementById('auth-overlay').style.display='none';
  initChat();
}

async function doRegister(){
  const nom=document.getElementById('r-nom').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const tel=document.getElementById('r-tel').value.trim();
  const pass=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err');
  err.style.display='none';
  if(!nom||!email||!pass){err.textContent='Remplissez tous les champs';err.style.display='block';return;}
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent='❌ '+error.message;err.style.display='block';return;}
  await sb.from('utilisateurs').insert({id:data.user.id,nom,email,telephone:tel,role:'client',statut:'actif'});
  currentUser=data.user;
  document.getElementById('auth-overlay').style.display='none';
  initChat();
}

// INIT
async function initChat(){
  await loadAllProducts();
  const hour=new Date().getHours();
  const greeting=hour<12?'Bonjour':'Bonsoir';
  const userName=currentUser?'':'';
  
  addAIMessage(`${greeting} ! 👋 Je suis **Yéyé Assistant**, votre vendeur IA personnel.\n\nJe peux vous aider à :\n• 🛒 Trouver les meilleurs produits\n• 💰 Optimiser votre budget\n• 📦 Créer votre panier automatiquement\n• 🚀 Passer votre commande\n\nQue souhaitez-vous acheter aujourd'hui ?`);
  
  setTimeout(()=>addSuggestions(['🍽️ Je veux manger pour 5000 FCFA','🥬 Produits frais du marché','🔥 Voir les promotions','🐟 Je cherche du poisson fumé']),500);
}

async function loadAllProducts(){
  const {data}=await sb.from('produits').select('*,categories(nom),boutiques(nom)').eq('actif',true).gt('stock',0);
  allProducts=data||[];
}

// CHAT FUNCTIONS
function addAIMessage(text,extras=null){
  const chat=document.getElementById('chat-area');
  const div=document.createElement('div');
  div.className='msg msg-ai';
  const time=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML=`
    <div class="msg-avatar" style="overflow:hidden;padding:0"><img src="https://omkmmlbdkzhorrrbeabm.supabase.co/storage/v1/object/public/avatars/AF7B3561-29FF-4B02-90D6-C94B558EDA89.PNG" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.textContent='🌿'"/></div>
    <div>
      <div class="msg-bubble">${formatText(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  chat.appendChild(div);
  if(extras)chat.appendChild(extras);
  scrollChat();
}

function addUserMessage(text){
  const chat=document.getElementById('chat-area');
  const div=document.createElement('div');
  div.className='msg msg-user';
  const time=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML=`
    <div class="msg-avatar">👤</div>
    <div>
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  document.getElementById('chat-area').appendChild(div);
  scrollChat();
}

function showTyping(){
  const chat=document.getElementById('chat-area');
  const div=document.createElement('div');
  div.id='typing-indicator';
  div.className='typing';
  div.innerHTML='<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollChat();
}

function hideTyping(){
  const t=document.getElementById('typing-indicator');
  if(t)t.remove();
}

function addSuggestions(items){
  const div=document.createElement('div');
  div.className='suggestions';
  div.innerHTML=items.map(s=>`<button class="chip" onclick="sendQuick('${s.replace(/'/g,"\\'")}')">  ${s}</button>`).join('');
  document.getElementById('chat-area').appendChild(div);
  scrollChat();
}

function addProductCards(products){
  const div=document.createElement('div');
  div.className='products-scroll';
  div.innerHTML=products.slice(0,6).map(p=>`
    <div class="prod-card">
      ${p.image_url?`<img src="${p.image_url}" class="prod-card-img" alt="${p.nom}"/>`:`<div class="prod-card-img">${catEmoji(p.categories?.nom)}</div>`}
      <div class="prod-card-body">
        <div class="prod-card-name" title="${p.nom}">${p.nom}</div>
        <div class="prod-card-price">${fmt(p.prix_promo||p.prix)} FCFA/${p.unite}</div>
        <button class="prod-card-btn" id="btn-${p.id}" onclick="addToCartAI('${p.id}')">
          🛒 Ajouter
        </button>
      </div>
    </div>`).join('');
  document.getElementById('chat-area').appendChild(div);
  scrollChat();
}

function addBundleCard(products,budget){
  const total=products.reduce((s,p)=>s+(p.prix_promo||p.prix),0);
  const div=document.createElement('div');
  div.className='bundle-card';
  div.innerHTML=`
    <div class="bundle-title">🎁 Panier suggéré pour ${fmt(budget)} FCFA</div>
    ${products.map(p=>`
      <div class="bundle-item">
        ${p.image_url?`<img src="${p.image_url}" class="bundle-item-img" alt="${p.nom}"/>`:`<div class="bundle-item-img">${catEmoji(p.categories?.nom)}</div>`}
        <div class="bundle-item-name">${p.nom}</div>
        <div class="bundle-item-price">${fmt(p.prix_promo||p.prix)} FCFA</div>
      </div>`).join('')}
    <div class="bundle-total"><span>Total panier</span><span>${fmt(total)} FCFA</span></div>
    <button class="bundle-btn" id="bundle-btn-${Date.now()}" data-ids="${products.map(p=>p.id).join(',')}" onclick="addBundleToCart(this.dataset.ids.split(','))">
      ✅ Ajouter tout au panier
    </button>`;
  document.getElementById('chat-area').appendChild(div);
  scrollChat();
}

// SEND MESSAGE
async function sendMessage(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||isTyping)return;
  input.value='';
  input.style.height='auto';
  addUserMessage(text);
  conversationHistory.push({role:'user',content:text});
  await processWithAI(text);
}

function sendQuick(text){
  document.getElementById('msg-input').value=text;
  sendMessage();
}

async function processWithAI(userMessage){
  isTyping=true;
  document.getElementById('send-btn').disabled=true;
  showTyping();

  // Build context with available products
  const productContext=allProducts.slice(0,30).map(p=>
    `- ${p.nom} (${p.categories?.nom||'—'}): ${fmt(p.prix_promo||p.prix)} FCFA/${p.unite}, ID:${p.id}${p.prix_promo?' [PROMO]':''}`
  ).join('\n');

  const systemPrompt=`Tu es Yéyé Assistant, le vendeur IA de YéyéMarket - une marketplace béninoise.

PRODUITS DISPONIBLES:
${productContext}

INSTRUCTIONS:
- Réponds TOUJOURS en français
- Sois chaleureux, commercial et efficace
- Guide TOUJOURS vers un achat concret
- Propose des produits spécifiques disponibles dans la liste
- Quand le client mentionne un budget, suggère un panier complet
- Utilise des emojis pour rendre les réponses visuelles
- Limite tes réponses à 3-4 phrases maximum
- À la fin, propose TOUJOURS des suggestions d'actions

ACTIONS SPÉCIALES (inclure dans ta réponse sous forme JSON à la fin):
- Pour montrer des produits: {"action":"show_products","ids":["id1","id2","id3"]}
- Pour créer un bundle: {"action":"create_bundle","ids":["id1","id2"],"budget":5000}
- Pour des suggestions: {"action":"suggestions","items":["suggestion1","suggestion2"]}

Réponds naturellement puis ajoute l'action JSON sur une nouvelle ligne si nécessaire.`;

  try {
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:conversationHistory.slice(-8)
      })
    });

    const data=await response.json();
    const fullText=data.content?.[0]?.text||'';
    
    // Parse action JSON if present
    let messageText=fullText;
    let action=null;
    const jsonMatch=fullText.match(/\{\"action\"[^}]+(?:\{[^}]*\}[^}]*)?\}/s);
    if(jsonMatch){
      try{action=JSON.parse(jsonMatch[0]);messageText=fullText.replace(jsonMatch[0],'').trim();}catch(e){}
    }

    hideTyping();
    conversationHistory.push({role:'assistant',content:messageText});
    addAIMessage(messageText);

    // Execute action
    if(action){
      await executeAction(action);
    }

  } catch(e){
    hideTyping();
    // Fallback intelligent sans API
    await fallbackResponse(userMessage);
  }

  isTyping=false;
  document.getElementById('send-btn').disabled=false;
}

async function executeAction(action){
  await new Promise(r=>setTimeout(r,300));
  
  if(action.action==='show_products'&&action.ids){
    const prods=action.ids.map(id=>allProducts.find(p=>p.id===id)).filter(Boolean);
    if(prods.length)addProductCards(prods);
  }
  else if(action.action==='create_bundle'&&action.ids){
    const prods=action.ids.map(id=>allProducts.find(p=>p.id===id)).filter(Boolean);
    if(prods.length)addBundleCard(prods,action.budget||5000);
  }
  else if(action.action==='suggestions'&&action.items){
    addSuggestions(action.items);
  }
}

async function fallbackResponse(msg){
  const lower=msg.toLowerCase();
  let prods=[];
  let response='';
  
  // Budget detection
  const budgetMatch=msg.match(/(\d+)\s*(fcfa|f|franc)?/i);
  const budget=budgetMatch?parseInt(budgetMatch[1]):0;
  
  if(budget>=1000){
    // Find products within budget
    prods=allProducts.filter(p=>(p.prix_promo||p.prix)<=budget).slice(0,4);
    response=`Voici ce que je peux vous proposer dans votre budget de ${fmt(budget)} FCFA ! 🛒\n\nJ'ai sélectionné les meilleurs produits pour vous 👇`;
    addAIMessage(response);
    if(prods.length)addBundleCard(prods,budget);
    addSuggestions(['Ajouter de la sauce','Je veux autre chose','Valider ma commande']);
    return;
  }
  
  // Keyword search
  const keywords=['poisson','viande','légume','fruit','riz','gari','huile','tomate','oignon','haricot'];
  for(const kw of keywords){
    if(lower.includes(kw)){
      prods=allProducts.filter(p=>p.nom.toLowerCase().includes(kw)||p.categories?.nom?.toLowerCase().includes(kw)).slice(0,4);
      if(prods.length)break;
    }
  }
  
  if(prods.length){
    response=`Parfait ! Voici ce que j'ai trouvé pour vous 🎯\n\nCes produits sont disponibles et frais !`;
    addAIMessage(response);
    addProductCards(prods);
    addSuggestions(['Ajouter au panier','Voir plus de produits','Je cherche autre chose']);
  } else if(lower.includes('promo')||lower.includes('offre')){
    prods=allProducts.filter(p=>p.prix_promo).slice(0,4);
    response=`🔥 Nos meilleures promotions du jour !\n\nProfitez de ces offres exceptionnelles 👇`;
    addAIMessage(response);
    if(prods.length)addProductCards(prods);
    else addAIMessage('Pas de promotions en ce moment, mais tous nos produits sont à prix juste ! 😊');
  } else {
    response=`Je comprends votre besoin ! 😊\n\nPourriez-vous me préciser :\n• Quel type de produit cherchez-vous ?\n• Quel est votre budget ?\n\nJe vais vous trouver les meilleures options !`;
    addAIMessage(response);
    addSuggestions(['🍽️ Repas pour 5000 FCFA','🥬 Légumes frais','🐟 Poisson','🌾 Céréales']);
  }
}

// CART FUNCTIONS
function addToCartAI(prodId){
  const prod=allProducts.find(p=>p.id===prodId);
  if(!prod)return;
  if(cart[prodId]){cart[prodId].qty++;toast('✅ Quantité mise à jour !','ok');return;}
  cart[prodId]={...prod,qty:1};
  suggestedIds.add(prodId);
  updateCartFloat();
  const btn=document.getElementById('btn-'+prodId);
  if(btn){btn.textContent='✅ Ajouté !';btn.classList.add('added');setTimeout(()=>{btn.innerHTML='🛒 Ajouter';btn.classList.remove('added');},2000);}
  toast('✅ '+prod.nom+' ajouté !','ok');
  // AI confirmation - seulement si nouveaux produits disponibles
  setTimeout(()=>{
    const suggestions=getSuggestions(prod);
    if(suggestions.length){
      addAIMessage(`Super choix ! 🎉 **${prod.nom}** est dans votre panier.\n\nVous aimerez aussi :`);
      addProductCards(suggestions);
    } else {
      addAIMessage(`**${prod.nom}** ajouté ! 🛒\n\nVoulez-vous valider votre commande ?`);
      addSuggestions(['✅ Valider la commande','🛒 Voir mon panier','➕ Autre chose']);
    }
  },600);
}

function addBundleToCart(ids){
  if(!ids||!ids.length){toast('Erreur panier','err');return;}
  let added=0;
  ids.forEach(id=>{
    const prod=allProducts.find(p=>p.id===String(id).trim());
    if(prod){
      if(cart[prod.id])cart[prod.id].qty++;
      else cart[prod.id]={...prod,qty:1};
      suggestedIds.add(prod.id);
      added++;
    }
  });
  updateCartFloat();
  if(added>0){
    toast('🛒 '+added+' produits ajoutés !','ok');
    addAIMessage('✅ Parfait ! **'+added+' produits** ajoutés à votre panier.\n\nVoulez-vous valider votre commande maintenant ?');
    addSuggestions(['✅ Valider la commande','🛒 Voir mon panier','➕ Ajouter autre chose']);
  } else {
    toast('Produits introuvables','err');
  }
}

let suggestedIds=new Set();
function getSuggestions(prod){
  const catId=prod.categorie_id;
  const results=allProducts.filter(p=>
    p.id!==prod.id&&
    !suggestedIds.has(p.id)&&
    !Object.keys(cart).includes(p.id)&&
    (p.categorie_id===catId||suggestPairs[prod.categories?.nom]?.includes(p.categories?.nom))
  ).slice(0,3);
  results.forEach(p=>suggestedIds.add(p.id));
  return results;
}

const suggestPairs={'Céréales':['Huiles','Légumes'],'Poissons':['Épices','Légumes'],'Viandes':['Épices','Légumes','Huiles'],'Légumes':['Huiles','Épices']};

function updateCartFloat(){
  const items=Object.values(cart);
  const count=items.reduce((s,i)=>s+i.qty,0);
  const total=items.reduce((s,i)=>s+(i.prix_promo||i.prix)*i.qty,0);
  const float=document.getElementById('cart-float');
  if(count>0){
    float.style.display='block';
    document.getElementById('cf-count').textContent=count+' article'+(count>1?'s':'');
    document.getElementById('cf-total').textContent=fmt(total)+' FCFA';
  } else {
    float.style.display='none';
  }
}

function openCart(){
  renderCartDrawer();
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
}

function closeCart(){
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
}

function renderCartDrawer(){
  const items=Object.values(cart);
  const itemsEl=document.getElementById('cart-items');
  const summaryEl=document.getElementById('cart-summary');
  if(!items.length){itemsEl.innerHTML='<div style="text-align:center;padding:32px;color:var(--g400)"><div style="font-size:40px;margin-bottom:8px">🛒</div><p>Panier vide</p></div>';summaryEl.innerHTML='';return;}
  const subtotal=items.reduce((s,i)=>s+(i.prix_promo||i.prix)*i.qty,0);
  const livraison=500;
  itemsEl.innerHTML=items.map(item=>`
    <div class="cart-item">
      <div class="cart-item-img">${item.image_url?`<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover" alt="${item.nom}"/>`:'📦'}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.nom}</div>
        <div class="cart-item-price">${fmt(item.prix_promo||item.prix)} FCFA/${item.unite}</div>
      </div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span style="font-weight:700;min-width:20px;text-align:center">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>
    </div>`).join('');
  summaryEl.innerHTML=`
    <div class="cart-row"><span>Sous-total</span><span>${fmt(subtotal)} FCFA</span></div>
    <div class="cart-row"><span>Livraison</span><span>${fmt(livraison)} FCFA</span></div>
    <div class="cart-row total"><span>Total</span><span>${fmt(subtotal+livraison)} FCFA</span></div>`;
}

function changeQty(id,d){
  if(!cart[id])return;
  cart[id].qty=Math.max(0,cart[id].qty+d);
  if(cart[id].qty===0)delete cart[id];
  updateCartFloat();
  renderCartDrawer();
}

function checkout(){
  closeCart();
  if(!currentUser){
    addAIMessage('Pour finaliser votre commande, vous devez être connecté. 🔐\n\nConnectez-vous ou créez un compte rapidement !');
    setTimeout(()=>document.getElementById('auth-overlay').style.display='flex',500);
    return;
  }
  // Redirect to main store for checkout
  const cartData=encodeURIComponent(JSON.stringify(cart));
  addAIMessage('🎉 Parfait ! Je vous redirige vers la page de paiement...\n\nVotre panier a été sauvegardé !');
  setTimeout(()=>window.location.href='index.html',2000);
}

// UTILS
function clearChat(){
  document.getElementById('chat-area').innerHTML='';
  conversationHistory=[];
  suggestedIds=new Set();
  cart={};
  updateCartFloat();
  initChat();
}

function formatText(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br/>');
}

function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return(n||0).toLocaleString('fr-FR');}
function catEmoji(nom){const m={'Viandes':'🥩','Poissons':'🐟','Légumes':'🥦','Fruits':'🍌','Épicerie':'🛍️','Brasserie':'🍺','Huiles':'🫙','Épices':'🌶️','Céréales & Tubercules':'🌾','Restaurants':'🍽️','Boissons':'🥤','Oeufs':'🥚','Marché':'🧺'};return m[nom]||'📦';}
function scrollChat(){const c=document.getElementById('chat-area');c.scrollTop=c.scrollHeight;}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

// INIT
checkSession();
</script>
